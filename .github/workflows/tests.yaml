---
name: Test and build

"on":
  push:
    paths-ignore:
      - ".github/**"
      - "*.md"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install yamllint
        run: sudo apt install yamllint
      - name: Lint
        run: yamllint .

  unit_and_sanity:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - ansible_core: "2.18"
            python_version: "3.13"
          - ansible_core: "2.19"
            python_version: "3.13"
          - ansible_core: "2.19"
            python_version: "3.13"
          - ansible_core: "2.20"
            python_version: "3.13"
          - ansible_core: "2.20"
            python_version: "3.14"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python_version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}
      - name: Install ansible ${{ matrix.ansible_core }}
        run: |
          python -m pip install --upgrade pip
          pip install 'ansible-core~=${{ matrix.ansible_core }}.0' requests pytest
      - name: Sanity tests
        run: ansible-test sanity --requirements --python ${{ matrix.python_version }} --color yes
        working-directory: ansible_collections/serverscom/sc_api
      - name: Unit tests
        run: ansible-test units --requirements --python ${{ matrix.python_version }} --color yes
        working-directory: ansible_collections/serverscom/sc_api
      - name: Token-free integration tests
        run: ansible-test integration --requirements --python ${{ matrix.python_version }} sc_no_token_tests --color yes
        working-directory: ansible_collections/serverscom/sc_api
      - name: Try-build by ansible-galaxy
        run: ansible-galaxy collection build
        working-directory: ansible_collections/serverscom/sc_api

  integration_tests_cloud:
    runs-on: ubuntu-24.04
    needs:
      - unit_and_sanity
      - lint
    concurrency:
      group: cloud
      cancel-in-progress: false
    steps:
      - name: Report used token
        run: echo ${{ secrets.SC_TOKEN }} | tail -c 5
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Configure integration tests
        run: |
          envsubst < integration_config.yml.template > ansible_collections/serverscom/sc_api/tests/integration/integration_config.yml
        env:
          SC_TOKEN: "${{ secrets.SC_TOKEN }}"
      - name: Integration tests
        run: ansible-test integration --requirements --python 3.13 --color yes
          ssh_key
          cloud_computing_flavors_info
          cloud_computing_regions_info
          cloud_computing_images_info
          cloud_computing_openstack_credentials
          cloud_computing_instance
          cloud_computing_instance_info
          cloud_computing_instance_ptr
          cloud_computing_instances_info
          cloud_computing_instance_state
        # cloud_computing_instance_reinstall  - broken and unfinished

        working-directory: ansible_collections/serverscom/sc_api
      - name: Cleanup secrets
        if: always()
        run: |
          dd if=/dev/zero bs=4k count=4 of=ansible_collections/serverscom/sc_api/tests/integration/integration_config.yml
          sync
          sync

  integration_tests_bm_1:
