---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: 'You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml'
  when: not sc_endpoint or not sc_token

- name: Test1, List for non-existing region
  sc_cloud_computing_instances_info:
    region_id: 42424242
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test1

- name: Check Test1
  assert:
    that:
      - test1 is not changed
      - test1.cloud_instances == []

- name: Test2, Get all instances in one region
  sc_cloud_computing_instances_info:
    region_id: 2
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test2

- name: Check Test2
  assert:
    that:
      - test2 is not changed
      - test2.cloud_instances|length > 0
      - test2.cloud_instances[0].id
      - test2.cloud_instances[0].region_id == 2
      - test2.cloud_instances[0].region_code
      - test2.cloud_instances[0].flavor_id
      - test2.cloud_instances[0].flavor_name
      - test2.cloud_instances[0].image_id
      - test2.cloud_instances[0].name
      - test2.cloud_instances[0].status

- name: Test3, Get all instances in all regions
  sc_cloud_computing_instances_info:
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test3

- name: Check Test3
  assert:
    that:
      - test3 is not changed
      - test3.cloud_instances|length > 0

- name: Get Debian 12 image ID
  sc_cloud_computing_images_info:
    region_id: 2
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: images_info

- name: Store Debian 12 image ID
  set_fact:
    debian_12_image_id: "{{ images_info.cloud_images | selectattr('name','equalto','Debian 12 (64 bit)') | map(attribute='id') | first }}"

- name: Create test instance with labels
  sc_cloud_computing_instance:
    state: present
    region_id: 2   # Luxembourg
    flavor_id: "33227-1"   # RND.2-1024-10
    image_id: "{{ debian_12_image_id }}"
    name: "sc-cloud-computing-instances-info-test"
    ssh_key_fingerprint: "9b:08:4d:a5:6d:45:26:72:2c:e0:9a:ee:bf:7d:03:a6"
    labels:
      test_label: "test_value"
    backup_copies: 0
    gpn: true
    ipv6: false
    ipv4: false
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test_instance

- name: Test4, Get instance info
  sc_cloud_computing_instances_info:
    label_selector: "test_label==test_value"
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test4

- name: Check Test4
  assert:
    that:
      - test4 is not changed
      - test4.cloud_instances|length > 0
      - test4.cloud_instances[0].id == test_instance.id
      - test4.cloud_instances[0].region_id == 2
      - test4.cloud_instances[0].name == "sc-cloud-computing-instances-info-test"

- name: Destroy test instance
  serverscom.sc_api.sc_cloud_computing_instance:
    instance_id: '{{ test_instance.id }}'
    state: absent
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
