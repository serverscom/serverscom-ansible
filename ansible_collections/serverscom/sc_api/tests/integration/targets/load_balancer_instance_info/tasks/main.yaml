---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: "You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml"
  when: (sc_endpoint | default('') | length == 0) or (sc_token | default('') | length == 0)

- name: Test1, Invalid ID
  sc_load_balancer_instance_info:
    id: QQQQ
    type: l4
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test1
  failed_when:
    - test1 is success
    - sc_endpoint not in test1.api_url
    - test1.msg != "Load balancer instance not found"

- name: Test2, Invalid Type
  sc_load_balancer_instance_info:
    id: V13vaNd8
    type: l8
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test2
  failed_when:
    - test2 is success
    - sc_endpoint not in test2.api_url
    - test2.msg != "Load balancer instance not found"

- name: Test3, Invalid ID, fail_on_absent==false
  sc_load_balancer_instance_info:
    id: QQQQ
    fail_on_absent: false
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test3
  failed_when:
    - test3.failed != false
    - test3.status != "absent"

- name: LB instance info tests
  block:
    - name: Create test load balancer instance
      serverscom.sc_api.sc_load_balancer_instance_l7:
        state: present
        name: "test-sc-load-balancer-instance-info-module"
        location_id: "{{ lb_test_location_id }}"
        store_logs: false
        geoip: false
        vhost_zones:
          - id: "zone1"
            ports: [80]
            ssl: false
            http2: true
            http_to_https_redirect: false
            http2_push_preload: false
            domains: ["demo.test"]
            location_zones:
              - location: "/"
                upstream_id: "upstream-zone1"
                upstream_path: "/"
                redirect: false
            real_ip_header:
              name: "real_ip"
              networks: ["{{ lb_test_network }}"]
        upstream_zones:
          - id: "upstream-zone1"
            hc_interval: 5
            hc_jitter: 0
            method: "round-robin"
            ssl: false
            sticky: false
            hc_domain: "demo.test"
            hc_path: "/"
            hc_method: "GET"
            hc_fails: 1
            hc_passes: 3
            grpc: false
            upstreams:
              - ip: "{{ lb_test_upstream_ip1 }}"
                port: 3000
                weight: 1
                max_conns: 63000
                max_fails: 0
                fail_timeout: 30
        labels:
          environment: staging
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      register: test_lb_instance

    - name: Test4, Get LB instance by id
      sc_load_balancer_instance_info:
        id: "{{ test_lb_instance.id }}"
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      register: test4

    - name: Check Test4
      assert:
        that:
          - test4 is not changed
          - (test4.created_at | string | length) > 0
          - (test4.updated_at | string | length) > 0
          - (test4.external_addresses | length) > 0
          - (test4.domains | length) > 0
          - (test4.upstream_zones | length) > 0
          - (test4.vhost_zones | length) > 0
          - (test4.id | string | length) > 0
          - test4.location_id is defined
          - (test4.name | string | length) > 0
          - (test4.status | string | length) > 0
          - (test4.type | string | length) > 0
  always:
    - name: Destroy test load balancer instance
      serverscom.sc_api.sc_load_balancer_instance_l7:
        state: absent
        name: "test-sc-load-balancer-instance-info-module"
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
