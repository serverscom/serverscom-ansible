---
- name: Test1, List networks
  serverscom.sc_api.sc_sbm_server_networks_info:
    server_id: '{{ test_sbm_server_id }}'
  register: test1

- name: Check Test1
  assert:
    that:
      - test1 is not changed
      - test1.networks is defined
      - test1.networks | length > 0

- name: Test2, List only private IPv4 networks
  serverscom.sc_api.sc_sbm_server_networks_info:
    server_id: '{{ test_sbm_server_id }}'
    family: ipv4
    interface_type: private
  register: test2

- name: Check Test2
  assert:
    that:
      - test2 is not changed
      - test2.networks is defined

- name: Test3, Get single network
  serverscom.sc_api.sc_sbm_server_networks_info:
    server_id: '{{ test_sbm_server_id }}'
    network_id: '{{ test1.networks[0].id }}'
  register: test3
  when: test1.networks | length > 0

- name: Check Test3
  assert:
    that:
      - test3 is not changed
      - test3.id == test1.networks[0].id
  when: test1.networks | length > 0

- name: Test4, Create private IPv4 network in check mode
  serverscom.sc_api.sc_sbm_server_network:
    server_id: '{{ test_sbm_server_id }}'
    state: present
    mask: 29
  check_mode: true
  register: test4

- name: Check Test4
  assert:
    that:
      - test4 is changed

- name: Test5, Create private IPv4 network
  serverscom.sc_api.sc_sbm_server_network:
    server_id: '{{ test_sbm_server_id }}'
    state: present
    mask: 29
  register: test5

- name: Check Test5
  assert:
    that:
      - test5 is changed
      - test5.id is defined

- name: Test6, Delete the created network
  serverscom.sc_api.sc_sbm_server_network:
    server_id: '{{ test_sbm_server_id }}'
    state: absent
    network_id: '{{ test5.id }}'
  register: test6

- name: Check Test6
  assert:
    that:
      - test6 is changed

- name: Test7, Delete same network again (idempotency)
  serverscom.sc_api.sc_sbm_server_network:
    server_id: '{{ test_sbm_server_id }}'
    state: absent
    network_id: '{{ test5.id }}'
  register: test7

- name: Check Test7
  assert:
    that:
      - test7 is not changed

- name: Test8, List networks using hostname
  serverscom.sc_api.sc_sbm_server_networks_info:
    hostname: '{{ test_hostname }}'
  register: test8

- name: Check Test8
  assert:
    that:
      - test8 is not changed
      - test8.networks is defined
      - test8.networks | length > 0

- name: Test9, Create network using hostname
  serverscom.sc_api.sc_sbm_server_network:
    hostname: '{{ test_hostname }}'
    state: present
    mask: 29
  register: test9

- name: Check Test9
  assert:
    that:
      - test9 is changed
      - test9.id is defined

- name: Test10, Delete the hostname-created network
  serverscom.sc_api.sc_sbm_server_network:
    hostname: '{{ test_hostname }}'
    state: absent
    network_id: '{{ test9.id }}'
  register: test10

- name: Check Test10
  assert:
    that:
      - test10 is changed

- name: Test11, Verify server_id and hostname are mutually exclusive (network)
  serverscom.sc_api.sc_sbm_server_network:
    server_id: '{{ test_sbm_server_id }}'
    hostname: '{{ test_hostname }}'
    state: present
    mask: 29
  register: test11
  ignore_errors: true

- name: Check Test11
  assert:
    that:
      - test11 is failed

- name: Test12, Verify server_id and hostname are mutually exclusive (networks_info)
  serverscom.sc_api.sc_sbm_server_networks_info:
    server_id: '{{ test_sbm_server_id }}'
    hostname: '{{ test_hostname }}'
  register: test12
  ignore_errors: true

- name: Check Test12
  assert:
    that:
      - test12 is failed
