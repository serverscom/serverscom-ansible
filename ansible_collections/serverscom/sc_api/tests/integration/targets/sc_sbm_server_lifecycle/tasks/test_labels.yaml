---
- name: Test1, Update labels on non-existing server
  serverscom.sc_api.sc_sbm_server_labels:
    server_id: '{{ non_existing_id }}'
    labels:
      env: test
  register: test1
  ignore_errors: true

- name: Check Test1
  assert:
    that:
      - test1 is not success

- name: Test2, Set labels in check mode
  serverscom.sc_api.sc_sbm_server_labels:
    server_id: '{{ test_sbm_server_id }}'
    labels:
      environment: integration-test
      managed_by: ansible
  check_mode: true
  register: test2

- name: Test2 verify, Get server info to check labels unchanged
  serverscom.sc_api.sc_sbm_server_info:
    server_id: '{{ test_sbm_server_id }}'
  register: test2_verify

- name: Check Test2
  assert:
    that:
      - test2 is changed
      - test2_verify.labels.environment is not defined or test2_verify.labels.environment != 'integration-test'

- name: Test3, Set labels
  serverscom.sc_api.sc_sbm_server_labels:
    server_id: '{{ test_sbm_server_id }}'
    labels:
      environment: integration-test
      managed_by: ansible
  register: test3

- name: Check Test3
  assert:
    that:
      - test3 is changed
      - test3.labels.environment == 'integration-test'
      - test3.labels.managed_by == 'ansible'

- name: Test4, Set same labels (idempotency)
  serverscom.sc_api.sc_sbm_server_labels:
    server_id: '{{ test_sbm_server_id }}'
    labels:
      environment: integration-test
      managed_by: ansible
  register: test4

- name: Check Test4
  assert:
    that:
      - test4 is not changed

- name: Test5, Clear labels
  serverscom.sc_api.sc_sbm_server_labels:
    server_id: '{{ test_sbm_server_id }}'
    labels: {}
  register: test5

- name: Check Test5
  assert:
    that:
      - test5 is changed
      - test5.labels == {}

- name: Test6, Set labels using hostname
  serverscom.sc_api.sc_sbm_server_labels:
    hostname: '{{ test_hostname }}'
    labels:
      hostname_test: passed
  register: test6

- name: Check Test6
  assert:
    that:
      - test6 is changed
      - test6.labels.hostname_test == 'passed'

- name: Test7, Clear labels after hostname test
  serverscom.sc_api.sc_sbm_server_labels:
    server_id: '{{ test_sbm_server_id }}'
    labels: {}
  register: test7

- name: Check Test7
  assert:
    that:
      - test7 is changed

- name: Test8, Verify server_id and hostname are mutually exclusive
  serverscom.sc_api.sc_sbm_server_labels:
    server_id: '{{ test_sbm_server_id }}'
    hostname: '{{ test_hostname }}'
    labels: {}
  register: test8
  ignore_errors: true

- name: Check Test8
  assert:
    that:
      - test8 is failed
