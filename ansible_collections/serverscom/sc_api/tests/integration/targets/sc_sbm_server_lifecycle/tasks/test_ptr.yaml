---
- name: Test1, Query PTR for non-existing server
  serverscom.sc_api.sc_sbm_server_ptr_info:
    server_id: '{{ non_existing_id }}'
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test1
  ignore_errors: true

- name: Check Test1
  assert:
    that:
      - test1.status_code == 404

- name: Get SBM server info for PTR tests
  serverscom.sc_api.sc_sbm_server_info:
    server_id: '{{ test_sbm_server_id }}'
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: sbm_server

- name: Test2, Query PTR records
  serverscom.sc_api.sc_sbm_server_ptr_info:
    server_id: '{{ test_sbm_server_id }}'
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test2

- name: Check Test2
  assert:
    that:
      - test2 is not changed
      - test2.ptr_records is defined

- name: Test3, Create PTR record in check mode
  serverscom.sc_api.sc_sbm_server_ptr:
    server_id: '{{ test_sbm_server_id }}'
    domain: ptr-test.example.com
    ip: '{{ sbm_server.public_ipv4_address }}'
    state: present
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  check_mode: true
  register: test3

- name: Test3 verify, Query PTR records after check_mode
  serverscom.sc_api.sc_sbm_server_ptr_info:
    server_id: '{{ test_sbm_server_id }}'
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test3_verify

- name: Check Test3
  assert:
    that:
      - test3 is changed
      - test3_verify.ptr_records | selectattr('domain', 'equalto', 'ptr-test.example.com') | list | length == 0

- name: Test4, Create PTR record
  serverscom.sc_api.sc_sbm_server_ptr:
    server_id: '{{ test_sbm_server_id }}'
    domain: ptr-test.example.com
    ip: '{{ sbm_server.public_ipv4_address }}'
    state: present
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test4

- name: Check Test4
  assert:
    that:
      - test4 is changed
      - test4.ptr_records | selectattr('domain', 'equalto', 'ptr-test.example.com') | list | length == 1

- name: Test5, Create PTR record again (idempotency)
  serverscom.sc_api.sc_sbm_server_ptr:
    server_id: '{{ test_sbm_server_id }}'
    domain: ptr-test.example.com
    ip: '{{ sbm_server.public_ipv4_address }}'
    state: present
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test5

- name: Check Test5
  assert:
    that:
      - test5 is not changed

- name: Test6, Delete PTR record in check mode
  serverscom.sc_api.sc_sbm_server_ptr:
    server_id: '{{ test_sbm_server_id }}'
    domain: ptr-test.example.com
    ip: '{{ sbm_server.public_ipv4_address }}'
    state: absent
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  check_mode: true
  register: test6

- name: Test6 verify, Query PTR records after check_mode delete
  serverscom.sc_api.sc_sbm_server_ptr_info:
    server_id: '{{ test_sbm_server_id }}'
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test6_verify

- name: Check Test6
  assert:
    that:
      - test6 is changed
      - test6_verify.ptr_records | selectattr('domain', 'equalto', 'ptr-test.example.com') | list | length == 1

- name: Test7, Delete PTR record
  serverscom.sc_api.sc_sbm_server_ptr:
    server_id: '{{ test_sbm_server_id }}'
    domain: ptr-test.example.com
    ip: '{{ sbm_server.public_ipv4_address }}'
    state: absent
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test7

- name: Check Test7
  assert:
    that:
      - test7 is changed
      - test7.ptr_records | selectattr('domain', 'equalto', 'ptr-test.example.com') | list | length == 0

- name: Test8, Delete PTR record again (idempotency)
  serverscom.sc_api.sc_sbm_server_ptr:
    server_id: '{{ test_sbm_server_id }}'
    domain: ptr-test.example.com
    ip: '{{ sbm_server.public_ipv4_address }}'
    state: absent
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test8

- name: Check Test8
  assert:
    that:
      - test8 is not changed

- name: Test9, Create PTR record using hostname
  serverscom.sc_api.sc_sbm_server_ptr:
    hostname: '{{ test_hostname }}'
    domain: ptr-hostname-test.example.com
    ip: '{{ sbm_server.public_ipv4_address }}'
    state: present
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test9

- name: Check Test9
  assert:
    that:
      - test9 is changed
      - test9.ptr_records | selectattr('domain', 'equalto', 'ptr-hostname-test.example.com') | list | length == 1

- name: Test10, Delete PTR record using hostname
  serverscom.sc_api.sc_sbm_server_ptr:
    hostname: '{{ test_hostname }}'
    domain: ptr-hostname-test.example.com
    ip: '{{ sbm_server.public_ipv4_address }}'
    state: absent
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test10

- name: Check Test10
  assert:
    that:
      - test10 is changed

- name: Test11, Verify server_id and hostname are mutually exclusive (ptr)
  serverscom.sc_api.sc_sbm_server_ptr:
    server_id: '{{ test_sbm_server_id }}'
    hostname: '{{ test_hostname }}'
    state: present
    ip: '{{ sbm_server.public_ipv4_address }}'
    domain: test-exclusive.example.com
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test11
  ignore_errors: true

- name: Check Test11
  assert:
    that:
      - test11 is failed
