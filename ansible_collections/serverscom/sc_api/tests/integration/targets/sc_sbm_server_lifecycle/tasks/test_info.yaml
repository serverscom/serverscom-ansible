---
- name: Test1, Absent server without failure
  serverscom.sc_api.sc_sbm_server_info:
    fail_on_absent: false
    server_id: '{{ non_existing_id }}'
  register: test1

- name: Check Test1
  assert:
    that:
      - test1 is not changed
      - test1.found == false
      - test1.ready == false

- name: Test2, Absent server with failure
  serverscom.sc_api.sc_sbm_server_info:
    fail_on_absent: true
    server_id: '{{ non_existing_id }}'
  register: test2
  ignore_errors: true

- name: Check Test2
  assert:
    that:
      - test2 is not success
      - test2.status_code == 404

- name: Test3, Information for real SBM server
  serverscom.sc_api.sc_sbm_server_info:
    fail_on_absent: false
    server_id: '{{ test_sbm_server_id }}'
  register: test3

- name: Check Test3
  assert:
    that:
      - test3 is success
      - test3.id == test_sbm_server_id
      - test3.configuration | length > 0
      - test3.configuration_details | length > 0
      - test3.found
      - test3.power_status
      - test3.location_id
      - test3.status
      - test3.type == "sbm_server"

- name: Test4, Check ready field logic
  serverscom.sc_api.sc_sbm_server_info:
    server_id: '{{ test_sbm_server_id }}'
  register: test4

- name: Check Test4 ready field
  assert:
    that:
      - test4.ready is defined
      - test4.ready is boolean

- name: Test5, Get server info by hostname
  serverscom.sc_api.sc_sbm_server_info:
    hostname: '{{ test_hostname }}'
  register: test5

- name: Check Test5
  assert:
    that:
      - test5 is success
      - test5.id == test_sbm_server_id
      - test5.found

- name: Test6, Get server info by non-existing hostname with fail_on_absent false
  serverscom.sc_api.sc_sbm_server_info:
    hostname: nonexistent-ci-sbm-test-xyz
    fail_on_absent: false
  register: test6

- name: Check Test6
  assert:
    that:
      - test6 is not changed
      - test6.found == false
      - test6.ready == false

- name: Test7, Get server info by non-existing hostname with fail_on_absent true
  serverscom.sc_api.sc_sbm_server_info:
    hostname: nonexistent-ci-sbm-test-xyz
    fail_on_absent: true
  register: test7
  ignore_errors: true

- name: Check Test7
  assert:
    that:
      - test7 is failed
      - '"not found" in test7.msg'

- name: Test8, Verify server_id and hostname are mutually exclusive
  serverscom.sc_api.sc_sbm_server_info:
    server_id: '{{ test_sbm_server_id }}'
    hostname: '{{ test_hostname }}'
  register: test8
  ignore_errors: true

- name: Check Test8
  assert:
    that:
      - test8 is failed
