---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: "You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml"
  when: (sc_endpoint | default('') | length == 0) or (sc_token | default('') | length == 0)

- name: LB tests with type L4
  block:
    - name: Create L4 load balancer instance
      serverscom.sc_api.sc_load_balancer_instance_l4:
        state: present
        name: "test-lb-l4-instances-list-module2"
        location_id: "{{ lb_test_location_id }}"
        vhost_zones:
          - id: "vhost-zone1"
            ports: [80, 443]
            udp: false
            proxy_protocol: false
            upstream_id: "upstream-zone1"
            description: "Test vhost zone"
        upstream_zones:
          - id: "upstream-zone1"
            method: "random.least_conn"
            udp: false
            hc_interval: 5
            hc_jitter: 5
            upstreams:
              - ip: "{{ lb_test_upstream_ip1 }}"
                port: 3000
                weight: 1
                max_conns: 63000
                max_fails: 0
                fail_timeout: 30
        labels:
          test_label: "test_value"
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      register: test_lb_instance

    - name: Test1, Get Load Balancer instances list
      sc_load_balancer_instances_list:
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      register: test1

    - name: Check Test1
      assert:
        that:
          - test1 is not changed
          - (test1.load_balancer_instances | length) > 0
          - (test1.load_balancer_instances[0].created_at | string | length) > 0
          - (test1.load_balancer_instances[0].updated_at | string | length) > 0
          - (test1.load_balancer_instances[0].external_addresses | length) > 0
          - (test1.load_balancer_instances[0].id | string | length) > 0
          - test1.load_balancer_instances[0].location_id is defined
          - (test1.load_balancer_instances[0].name | string | length) > 0
          - (test1.load_balancer_instances[0].status | string | length) > 0
          - (test1.load_balancer_instances[0].type | string | length) > 0

    - name: Test2, Get Load Balancer instances by name
      sc_load_balancer_instances_list:
        name: test-lb-l4-instances-list-module2
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      register: test2
    - debug: var=test2
    - name: Check Test2
      assert:
        that:
          - test2 is not changed
          - (test2.load_balancer_instances | length) > 0
          - (test2.load_balancer_instances[0].created_at | string | length) > 0
          - (test2.load_balancer_instances[0].updated_at | string | length) > 0
          - (test2.load_balancer_instances[0].external_addresses | length) > 0
          - (test2.load_balancer_instances[0].id | string | length) > 0
          - test2.load_balancer_instances[0].location_id is defined
          - test2.load_balancer_instances[0].name == "test-lb-l4-instances-list-module2"
          - (test2.load_balancer_instances[0].status | string | length) > 0
          - (test2.load_balancer_instances[0].type | string | length) > 0

    - name: Test3, Get Load Balancer instances by type
      sc_load_balancer_instances_list:
        type: l4
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      register: test3

    - name: Check Test3
      assert:
        that:
          - test3 is not changed
          - (test3.load_balancer_instances | length) > 0
          - (test3.load_balancer_instances[0].created_at | string | length) > 0
          - (test3.load_balancer_instances[0].updated_at | string | length) > 0
          - (test3.load_balancer_instances[0].external_addresses | length) > 0
          - (test3.load_balancer_instances[0].id | string | length) > 0
          - test3.load_balancer_instances[0].location_id is defined
          - (test3.load_balancer_instances[0].name | string | length) > 0
          - (test3.load_balancer_instances[0].status | string | length) > 0
          - (test3.load_balancer_instances[0].type | string | length) > 0

    - name: Test4, Get Load Balancer instances by label
      sc_load_balancer_instances_list:
        label_selector: "test_label==test_value"
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      register: test4

    - name: Check Test4
      assert:
        that:
          - test4 is not changed
          - (test4.load_balancer_instances | length) > 0
          - (test4.load_balancer_instances[0].created_at | string | length) > 0
          - (test4.load_balancer_instances[0].updated_at | string | length) > 0
          - (test4.load_balancer_instances[0].external_addresses | length) > 0
          - (test4.load_balancer_instances[0].id | string | length) > 0
          - test4.load_balancer_instances[0].location_id is defined
          - (test4.load_balancer_instances[0].name | string | length) > 0
          - (test4.load_balancer_instances[0].status | string | length) > 0
          - (test4.load_balancer_instances[0].type | string | length) > 0
          - test4.load_balancer_instances[0].labels.test_label == "test_value"
  always:
    - name: Destroy test load balancer instance
      serverscom.sc_api.sc_load_balancer_instance_l4:
        state: absent
        name: "test-lb-l4-instances-list-module2"
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
