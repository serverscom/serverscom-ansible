---
- name: Generate random test hostname
  set_fact:
    test_hostname: "ci-sbm-test-{{ 999999 | random(start=100000) }}"

- name: Get locations
  serverscom.sc_api.sc_baremetal_locations_info:
    search_pattern: "{{ sbm_test_location_code }}"
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: locations_result

- name: Assert location is available
  assert:
    that:
      - locations_result.locations | selectattr('code', 'eq', sbm_test_location_code) | list | length > 0
    fail_msg: "{{ sbm_test_location_code }} location not found in {{ locations_result.locations | map(attribute='code') | list }}"

- name: Set location facts
  set_fact:
    test_location_id: "{{ (locations_result.locations | selectattr('code', 'eq', sbm_test_location_code) | first).id }}"
    test_location_code: "{{ sbm_test_location_code }}"

- name: Get SBM flavor models for AMS7
  serverscom.sc_api.sc_sbm_flavor_models_info:
    location_id: "{{ test_location_id }}"
    search_pattern: "{{ sbm_test_flavor_name }}"
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: flavors_result

- name: Assert flavor model is available
  assert:
    that:
      - flavors_result.sbm_flavor_models | selectattr('name', 'match', '.*' ~ sbm_test_flavor_name ~ '.*') | list | length > 0
    fail_msg: "No {{ sbm_test_flavor_name }} flavor model available in {{ sbm_test_location_code }}. Available: {{ flavors_result.sbm_flavor_models | map(attribute='name') | list }}"

- name: Set flavor model facts
  set_fact:
    test_flavor_model_id: "{{ (flavors_result.sbm_flavor_models | selectattr('name', 'match', '.*' ~ sbm_test_flavor_name ~ '.*') | first).id }}"
    test_flavor_model_name: "{{ (flavors_result.sbm_flavor_models | selectattr('name', 'match', '.*' ~ sbm_test_flavor_name ~ '.*') | first).name }}"

- name: Get available OS for flavor in location
  serverscom.sc_api.sc_sbm_os_list:
    flavor_id: "{{ test_flavor_model_id }}"
    location_id: "{{ test_location_id }}"
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: os_result

- name: Assert OS list is not empty
  assert:
    that:
      - os_result.os_list | length > 0
    fail_msg: "No OS available for flavor {{ test_flavor_model_name }} in {{ sbm_test_location_code }}"

- name: Set OS facts
  set_fact:
    test_os_id: "{{ os_result.os_list[0].id }}"
    test_os_name: "{{ os_result.os_list[0].full_name }}"

- name: Create SBM test server using os_regex
  serverscom.sc_api.sc_sbm_server:
    state: present
    location_code: "{{ test_location_code }}"
    flavor_name: "{{ test_flavor_model_name }}"
    hostname: "{{ test_hostname }}"
    operating_system_regex: "{{ sbm_test_os_regex }}"
    wait: 86400
    update_interval: 60
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: created_server

- name: Set server ID fact
  set_fact:
    test_sbm_server_id: "{{ created_server.id }}"
