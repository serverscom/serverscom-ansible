---
# Module tests for errors. Should be relatively fast.

# Should make a get to server before doing reinstall
- name: Test1, Error on absent server
  serverscom.sc_api.sc_sbm_server_reinstall:
    server_id: '{{ non_existing_id }}'
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test1
  failed_when: false

- name: Check Test1
  assert:
    that:
      - test1 is not changed
      - test1.status_code == 404
      - "'v1/hosts/sbm_servers/' ~ non_existing_id in test1.api_url"

# Should fail on non-existing ssh key
- name: Test2, Error on absent ssh key
  serverscom.sc_api.sc_sbm_server_reinstall:
    server_id: '{{ test_sbm_server_id }}'
    ssh_key_name: should-not-exists
    operating_system_id: 42
    hostname: somename
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test2
  ignore_errors: true

- name: Check Test2
  assert:
    that:
      - test2 is failed
      - '"Unable to find registered ssh key" in test2.msg'

# Test check_mode - should not actually reinstall
- name: Test3, Check mode reinstall
  serverscom.sc_api.sc_sbm_server_reinstall:
    server_id: '{{ test_sbm_server_id }}'
    hostname: test-checkmode
    wait: 0
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  check_mode: true
  register: test3

- name: Check Test3
  assert:
    that:
      - test3 is changed

# Verify server status unchanged after check_mode
- name: Test3 verify, Get server info after check_mode
  serverscom.sc_api.sc_sbm_server_info:
    server_id: '{{ test_sbm_server_id }}'
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test3_verify

- name: Check Test3 verify - server not reinstalling
  assert:
    that:
      - test3_verify.operational_status != "installation"

# Test with invalid OS regex (no match)
- name: Test4, Error on no matching OS regex
  serverscom.sc_api.sc_sbm_server_reinstall:
    server_id: '{{ test_sbm_server_id }}'
    operating_system_regex: 'NonExistentOS12345'
    hostname: test-server
    wait: 0
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test4
  ignore_errors: true

- name: Check Test4
  assert:
    that:
      - test4 is failed
      - '"No OS options match" in test4.msg'

# Test wait/update_interval validation
- name: Test5, Error when update_interval > wait
  serverscom.sc_api.sc_sbm_server_reinstall:
    server_id: '{{ test_sbm_server_id }}'
    hostname: test-server
    wait: 30
    update_interval: 60
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test5
  ignore_errors: true

- name: Check Test5
  assert:
    that:
      - test5 is failed
      - '"Update interval" in test5.msg'

# Test server_hostname parameter
- name: Test6, Reinstall check mode using server_hostname
  serverscom.sc_api.sc_sbm_server_reinstall:
    server_hostname: '{{ test_hostname }}'
    hostname: '{{ test_hostname }}'
    wait: 0
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  check_mode: true
  register: test6

- name: Check Test6
  assert:
    that:
      - test6 is changed

# Test real reinstall with operating_system_name
- name: Test7, Reinstall server to Ubuntu 24.04 using operating_system_name
  serverscom.sc_api.sc_sbm_server_reinstall:
    server_id: '{{ test_sbm_server_id }}'
    operating_system_name: "{{ sbm_test_reinstall_os_name }}"
    hostname: '{{ test_hostname }}'
    wait: 86400
    update_interval: 60
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test7

- name: Check Test7
  assert:
    that:
      - test7 is changed
      - test7.status == 'active'
      - test7.ready == true

# Test mutual exclusivity of OS params
- name: Test8, Verify operating_system_id and operating_system_name are mutually exclusive
  serverscom.sc_api.sc_sbm_server_reinstall:
    server_id: '{{ test_sbm_server_id }}'
    operating_system_id: "{{ test_os_id }}"
    operating_system_name: '{{ test_os_name }}'
    hostname: '{{ test_hostname }}'
    wait: 0
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test8
  ignore_errors: true

- name: Check Test8
  assert:
    that:
      - test8 is failed

# Test nonexistent operating_system_name
- name: Test9, Reinstall with nonexistent operating_system_name
  serverscom.sc_api.sc_sbm_server_reinstall:
    server_id: '{{ test_sbm_server_id }}'
    operating_system_name: 'NonexistentOS 99.99 64-bit'
    hostname: '{{ test_hostname }}'
    wait: 0
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test9
  ignore_errors: true

- name: Check Test9
  assert:
    that:
      - test9 is failed
      - '"not found" in test9.msg'

# Test server_id and server_hostname mutual exclusivity
- name: Test10, Verify server_id and server_hostname are mutually exclusive
  serverscom.sc_api.sc_sbm_server_reinstall:
    server_id: '{{ test_sbm_server_id }}'
    server_hostname: '{{ test_hostname }}'
    hostname: '{{ test_hostname }}'
    wait: 0
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test10
  ignore_errors: true

- name: Check Test10
  assert:
    that:
      - test10 is failed
