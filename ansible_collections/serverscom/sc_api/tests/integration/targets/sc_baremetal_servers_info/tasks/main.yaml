---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: "You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml"
  when: not sc_endpoint or not sc_token

- name: Test1, retrieve list of servers
  sc_baremetal_servers_info:
    token: "{{ sc_token }}"
    endpoint: "{{ sc_endpoint }}"
  register: test1

- name: Check Test1
  assert:
    that:
      - test1 is not changed
      - test1.baremetal_servers|length > 0
      - test1.baremetal_servers[0].configuration
      - test1.baremetal_servers[0].id
      - test1.baremetal_servers[0].location_code
      - test1.baremetal_servers[0].location_id
      - test1.baremetal_servers[0].operational_status
      - test1.baremetal_servers[0].private_ipv4_address
      - test1.baremetal_servers[0].public_ipv4_address
      - test1.baremetal_servers[0].title
      - test1.baremetal_servers[0].type

- block:
    - name: PUT test label
      uri:
        url: "{{ sc_endpoint }}/hosts/dedicated_servers/{{ item }}"
        method: PUT
        headers:
          Authorization: "Bearer {{ sc_token }}"
          Content-Type: "application/json"
        body:
          labels:
            test_label: "test_value"
        body_format: json
        status_code: 200
      loop:
        - "{{ existing_server1_id }}"
        - "{{ existing_server2_id }}"
        - "{{ existing_server3_id }}"

    - name: Test2, retrieve list of servers by label
      sc_baremetal_servers_info:
        token: "{{ sc_token }}"
        endpoint: "{{ sc_endpoint }}"
        label_selector: "test_label==test_value"
      register: test2

    - name: Check Test2
      assert:
        that:
          - test2 is not changed
          - test2.baremetal_servers|length > 0
          - test2.baremetal_servers[0].configuration
          - test2.baremetal_servers[0].id
          - test2.baremetal_servers[0].location_code
          - test2.baremetal_servers[0].location_id
          - test2.baremetal_servers[0].operational_status
          - test2.baremetal_servers[0].private_ipv4_address
          - test2.baremetal_servers[0].public_ipv4_address
          - test2.baremetal_servers[0].title
          - test2.baremetal_servers[0].type
        fail_msg: "Test server not found by label"

  always:
    - name: Remove test label
      uri:
        url: "{{ sc_endpoint }}/hosts/dedicated_servers/{{ item }}"
        method: PUT
        headers:
          Authorization: "Bearer {{ sc_token }}"
          Content-Type: "application/json"
        body:
          labels: {}
        body_format: json
        status_code: 200
      loop:
        - "{{ existing_server1_id }}"
        - "{{ existing_server2_id }}"
        - "{{ existing_server3_id }}"

- name: Test3, retrieve list of servers by type
  sc_baremetal_servers_info:
    token: "{{ sc_token }}"
    endpoint: "{{ sc_endpoint }}"
    type: "dedicated_server"
  register: test3

- name: Check Test3
  assert:
    that:
      - test3.baremetal_servers | map(attribute='type') | unique == ['dedicated_server']
    fail_msg: "One or more servers are not of type 'dedicated_server'"
    success_msg: "All servers are of type 'dedicated_server'"
