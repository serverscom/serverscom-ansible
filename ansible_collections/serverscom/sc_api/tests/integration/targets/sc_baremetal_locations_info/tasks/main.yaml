---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: 'You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml'
  when: not sc_endpoint or not sc_token

- name: Test1, Simple get
  sc_baremetal_locations_info:
    token: '{{ sc_token }}'
    endpoint: '{{ sc_endpoint }}'
  register: test1

- name: Check Test1
  assert:
    that:
      - test1 is not changed
      - test1.locations|length >= 1
      - test1.locations[0].id is defined
      - test1.locations[0].name is defined
      - test1.locations[0].code is defined

- name: Test2, Search for location
  sc_baremetal_locations_info:
    token: '{{ sc_token }}'
    endpoint: '{{ sc_endpoint }}'
    search_pattern: US
  register: test2

- name: Check Test2
  assert:
    that:
      - test2.locations|length >= 1
      - test2.locations[0]
      - "'AMS1' not in test2|string"
      - "'DFW1' in test2|string"

- name: Test3, Filter by features
  sc_baremetal_locations_info:
    token: '{{ sc_token }}'
    endpoint: '{{ sc_endpoint }}'
    required_features:
      - disaggregated_public_ports
      - load_balancers_enabled
  register: test3

- name: Check Test3
  assert:
    that:
      - test3.locations|length >= 1
      - test3.locations[0]
      - '"disaggregated_public_ports" in test3.locations|to_nice_yaml'
      - '"load_balancers_enabled: false" not in test3.locations|to_nice_yaml'
