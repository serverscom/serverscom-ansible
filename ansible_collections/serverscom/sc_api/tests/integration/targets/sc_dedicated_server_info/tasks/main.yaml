---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: 'You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml'
  when: not sc_endpoint or not sc_token

- name: Test1, Absent server without failure
  sc_dedicated_server_info:
    fail_on_absent: false
    id: '{{ non_existing_id }}'
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test1

- name: Check Test1
  assert:
    that:
      - test1 is not changed
      - test1.found == false
      - test1.ready == false

- name: Test2, Absent server with failure
  sc_dedicated_server_info:
    fail_on_absent: true
    id: '{{ non_existing_id }}'
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test2
  ignore_errors: true

- name: Check Test2
  assert:
    that:
      - test2 is not success
      - test2.status_code == 404

- name: Test3, Information for real server
  sc_dedicated_server_info:
    fail_on_absent: false
    id: '{{ existing_server1_id }}'
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test3
- debug: var=test3
- name: Check Test3
  assert:
    that:
      - test3 is success
      - test3.id == existing_server1_id
      - test3.configuration|length > 0
      - test3.configuration_details|length > 0
      - test3.found
      - test3.power_status
      - test3.location_id
      - test3.status
      - test3.type == "dedicated_server"
