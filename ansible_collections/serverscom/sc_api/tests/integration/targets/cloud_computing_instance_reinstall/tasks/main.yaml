---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: 'You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml'
  when: not sc_endpoint or not sc_token

- name: prep, get regions
  sc_cloud_computing_regions_info:
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: regions

- name: Testsuite
  block:
    - name: Prepare, create instance
      sc_cloud_computing_instance:
        state: present
        region_id: '{{ regions.regions[0].id }}'
        flavor_name: "{{ cloud_test_flavor_name }}"
        image_regexp: 'Ubuntu.+'
        name: '{{ instance_name }}'
        backup_copies: 0
        gpn: true
        ipv6: true
        wait: 600
        update_interval: 5
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      register: instance

    - name: Test1, simple reinstall
      sc_cloud_computing_instance:
        state: reinstalled
        instance_id: '{{ instance.id }}'
        wait: 600
        update_interval: 5
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      register: test1

    - name: Get instance status for test1
      sc_cloud_computing_instance_info:
        instance_id: '{{ instance.id }}'
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      register: test1_info

    - debug: var=[test1,test1_info]

    - name: Check test1
      assert:
        that:
          - test1 is changed
          - test1.status == 'ACTIVE'
          - test1_info.status == 'ACTIVE'

    - name: Test2, reinstall with image in checkmode
      sc_cloud_computing_instance:
        state: reinstalled
        instance_id: '{{ instance.id }}'
        image_regexp: 'Debian.+'
        wait: 600
        update_interval: 5
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      check_mode: true
      register: test2

    - name: Get instance status for test2
      sc_cloud_computing_instance_info:
        instance_id: '{{ instance.id }}'
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      register: test2_info

    - debug: var=[test2,test2_info]

  always:
    - name: Cleanup instance
      sc_cloud_computing_instance:
        state: absent
        region_id: '{{ regions.regions[0].id }}'
        name: '{{ instance_name }}'
        wait: 600
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
