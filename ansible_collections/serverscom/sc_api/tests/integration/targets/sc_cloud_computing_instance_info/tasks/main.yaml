---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: 'You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml'
  when: not sc_endpoint or not sc_token

- name: Test1, List for non-existing instance
  sc_cloud_computing_instance_info:
    token: '{{ sc_token }}'
    endpoint: '{{ sc_endpoint }}'
    instance_id: 'M7e5Ba2v'
  register: test1
  failed_when: false

- name: Check Test1
  assert:
    that:
      - test1 is not changed
      - "'v1/cloud_computing/instances/M7e5Ba2v' in test1.api_url"
      - test1.status_code != 200

- name: Get Debian 12 image ID
  sc_cloud_computing_images_info:
    token: "{{ sc_token }}"
    region_id: 2
  register: images_info

- name: Store Debian 12 image ID
  set_fact:
    debian_12_image_id: "{{ images_info.cloud_images | selectattr('name','equalto','Debian 12 (64 bit)') | map(attribute='id') | first }}"

- name: Create test instance
  sc_cloud_computing_instance:
    token: "{{ sc_token }}"
    endpoint: '{{ sc_endpoint }}'
    state: present
    region_id: 2   # Luxembourg
    flavor_id: "33227-1"   # RND.2-1024-10
    image_id: "{{ debian_12_image_id }}"
    name: "sc-cloud-computing-instance-info-test"
    ssh_key_fingerprint: "9b:08:4d:a5:6d:45:26:72:2c:e0:9a:ee:bf:7d:03:a6"
    labels:
      test_label: "test_value"
    backup_copies: 0
    gpn: true
    ipv6: false
    ipv4: false
  register: test_instance

- name: Test2, Get instance info
  sc_cloud_computing_instance_info:
    token: '{{ sc_token }}'
    endpoint: '{{ sc_endpoint }}'
    instance_id: '{{ test_instance.id }}'
  register: test2

- name: Check Test2
  assert:
    that:
      - test2 is not changed
      - test2.name == "sc-cloud-computing-instance-info-test"
      - test2.status == "ACTIVE"
      - test2.region_id == 2
      - test2.flavor_id == "33227-1"
      - test2.image_id == debian_12_image_id
      - test2.labels.test_label == "test_value"
      - test2.backup_copies == 0
      - test2.gpn_enabled == true
      - test2.ipv6_enabled == false
      - test2.id == test_instance.id
      - test2.private_ipv4_address == test_instance.private_ipv4_address
      - test2.local_ipv4_address == test_instance.local_ipv4_address

- name: Destroy test instance
  serverscom.sc_api.sc_cloud_computing_instance:
    token: '{{ sc_token }}'
    instance_id: '{{ test_instance.id }}'
    state: absent
