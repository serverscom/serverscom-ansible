---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: "You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml"
  when: not sc_endpoint or not sc_token

- name: Tests prep, get regions
  sc_cloud_computing_regions_info:
    endpoint: "{{ sc_endpoint }}"
  environment:
    SC_TOKEN: '{{ sc_token }}'
  register: regions

- name: Tests, create and delete ptr records
  block:
    - name: Tests prep, create instance
      sc_cloud_computing_instance:
        endpoint: "{{ sc_endpoint }}"
        state: present
        region_id: "{{ regions.regions[0].id }}"
        flavor_name: SSD.30
        image_regexp: "Ubuntu.+"
        name: 537eb44e-eced-11ea-8fef-3b4e87dd916a
        backup_copies: 0
        gpn: true
        ipv6: true
        wait: 600
        update_interval: 5
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: instance

    - name: Test1, create ptr records in check mode
      sc_cloud_computing_instance_ptr:
        endpoint: "{{ sc_endpoint }}"
        domain: ptr1.example.com
        name: 537eb44e-eced-11ea-8fef-3b4e87dd916a
        state: present
      environment:
        SC_TOKEN: '{{ sc_token }}'
      check_mode: true
      register: test1_check_mode

    - name: Test1, get ptrs
      sc_cloud_computing_instance_ptr:
        endpoint: "{{ sc_endpoint }}"
        instance_name: 537eb44e-eced-11ea-8fef-3b4e87dd916a
        state: query
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test1_result

    - name: Check Test1
      assert:
        that:
          - test1_check_mode is changed
          - test1_result.ptr_records == []

    - name: Test2, create ptr record for public IP
      sc_cloud_computing_instance_ptr:
        endpoint: "{{ sc_endpoint }}"
        domain: ptr1.example.com
        ip: "{{ instance.public_ipv4_address }}"
        name: 537eb44e-eced-11ea-8fef-3b4e87dd916a
        state: present
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test2

    - name: Test2, create ptr record for public IP second time
      sc_cloud_computing_instance_ptr:
        endpoint: "{{ sc_endpoint }}"
        domain: ptr1.example.com
        ip: "{{ instance.public_ipv4_address }}"
        name: 537eb44e-eced-11ea-8fef-3b4e87dd916a
        state: present
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test2_second

    - name: Test2, get ptrs
      sc_cloud_computing_instance_ptr:
        endpoint: "{{ sc_endpoint }}"
        instance_name: 537eb44e-eced-11ea-8fef-3b4e87dd916a
        state: query
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test2_result

    - name: Check Test2
      assert:
        that:
          - test2 is changed
          - test2_result.ptr_records|length == 1
          - test2_result.ptr_records[0].domain == 'ptr1.example.com'
          - test2_result.ptr_records[0].ip == instance.public_ipv4_address
          - test2_second is not changed

    - name: Test3, remove PTR in check_mode
      sc_cloud_computing_instance_ptr:
        endpoint: "{{ sc_endpoint }}"
        domain: ptr1.example.com
        ip: "{{ instance.public_ipv4_address }}"
        name: 537eb44e-eced-11ea-8fef-3b4e87dd916a
        state: absent
      environment:
        SC_TOKEN: '{{ sc_token }}'
      check_mode: true
      register: test3_check_mode

    - name: Test3, get ptrs after check_mode
      sc_cloud_computing_instance_ptr:
        endpoint: "{{ sc_endpoint }}"
        instance_name: 537eb44e-eced-11ea-8fef-3b4e87dd916a
        state: query
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test3_result_after_check

    - name: Test3, remove PTR
      sc_cloud_computing_instance_ptr:
        endpoint: "{{ sc_endpoint }}"
        domain: ptr1.example.com
        ip: "{{ instance.public_ipv4_address }}"
        name: 537eb44e-eced-11ea-8fef-3b4e87dd916a
        state: absent
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test3

    - name: Test3, get ptrs after delete
      sc_cloud_computing_instance_ptr:
        endpoint: "{{ sc_endpoint }}"
        instance_name: 537eb44e-eced-11ea-8fef-3b4e87dd916a
        state: query
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test3_result

    - name: Test3, remove PTR second time
      sc_cloud_computing_instance_ptr:
        endpoint: "{{ sc_endpoint }}"
        domain: ptr1.example.com
        ip: "{{ instance.public_ipv4_address }}"
        name: 537eb44e-eced-11ea-8fef-3b4e87dd916a
        state: absent
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test3_second

    - name: Report
      debug: var=test3_result

    - name: Check Test3
      assert:
        that:
          - test3_check_mode is changed
          - test3 is changed
          - test3_second is not changed
          - test3_result_after_check.ptr_records|length == 1
          - test3_result_after_check.ptr_records[0].domain == 'ptr1.example.com'
          - test3_result_after_check.ptr_records[0].ip == instance.public_ipv4_address
          - test3_result.ptr_records|length == 0

    - name: Test4, create ptr record for public ipv4
      sc_cloud_computing_instance_ptr:
        endpoint: "{{ sc_endpoint }}"
        domain: ptr1.example.com
        ip: "{{ instance.public_ipv4_address }}"
        name: 537eb44e-eced-11ea-8fef-3b4e87dd916a
        state: present
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test4_ipv4

    - name: Test4, create ptr record for public ipv6
      sc_cloud_computing_instance_ptr:
        endpoint: "{{ sc_endpoint }}"
        domain: ptr2.example.com
        ip: "{{ instance.public_ipv6_address }}"
        name: 537eb44e-eced-11ea-8fef-3b4e87dd916a
        state: present
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test4_ipv6

    - name: Test4, get ptrs after creation
      sc_cloud_computing_instance_ptr:
        endpoint: "{{ sc_endpoint }}"
        instance_name: 537eb44e-eced-11ea-8fef-3b4e87dd916a
        state: query
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test4_result

    - name: Check Test4
      assert:
        that:
          - test4_ipv4 is changed
          - test4_ipv6 is changed
          - test4_result.ptr_records | length == 2
          - "'ptr1.example.com' in test4_result.ptr_records | map(attribute='domain') | list"
          - "'ptr2.example.com' in test4_result.ptr_records | map(attribute='domain') | list"
          - "instance.public_ipv4_address in test4_result.ptr_records | map(attribute='ip') | list"
          - "instance.public_ipv6_address in test4_result.ptr_records | map(attribute='ip') | list"

  always:
    - name: Tests cleanup
      sc_cloud_computing_instance:
        endpoint: "{{ sc_endpoint }}"
        state: absent
        region_id: "{{ regions.regions[0].id }}"
        name: 537eb44e-eced-11ea-8fef-3b4e87dd916a
        wait: 600
      environment:
        SC_TOKEN: '{{ sc_token }}'
