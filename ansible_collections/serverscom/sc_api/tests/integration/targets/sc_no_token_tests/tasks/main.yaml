---
# Token-free smoke tests: call every module once with valid parameters and
# an invalid token. Each module should fail with 401 Unauthorized, proving
# that it loads, passes argument validation, and reaches the API layer.
# No valid token is required.

- name: sc_baremetal_locations_info
  serverscom.sc_api.baremetal_locations_info:
    token: dummy
    endpoint: "https://api.servers.com/v1"
  register: result
  ignore_errors: true

- name: Verify sc_baremetal_locations_info
  assert:
    that:
      - result is failed
      - result.status_code == 401
      - "'token' in result.msg"

