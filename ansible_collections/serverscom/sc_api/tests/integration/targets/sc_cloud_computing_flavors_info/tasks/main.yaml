---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: "You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml"
  when: not sc_endpoint or not sc_token

- name: Test1, List for non-existing region
  sc_cloud_computing_flavors_info:
    endpoint: "{{ sc_endpoint }}"
    region_id: 424242
  environment:
    SC_TOKEN: '{{ sc_token }}'
  register: test1
  failed_when: test1.status_code!=404

- name: Report
  debug: var=test1

- name: Check Test1
  assert:
    that:
      - test1 is not changed
      - "'v1/cloud_computing/regions/424242/flavors' in test1.api_url"
      - test1.status_code == 404

- name: Test2 prep get all regions
  sc_cloud_computing_regions_info:
    endpoint: "{{ sc_endpoint }}"
  environment:
    SC_TOKEN: '{{ sc_token }}'
  register: reg_info

- name: Test2, Get flavors
  sc_cloud_computing_flavors_info:
    endpoint: "{{ sc_endpoint }}"
    region_id: "{{ reg_info.regions[0].id  }}"
  environment:
    SC_TOKEN: '{{ sc_token }}'
  register: test2

- debug: var=test2
- name: Check Test2
  assert:
    that:
      - test2 is not changed
      - test2.cloud_flavors|length > 0
      - test2.cloud_flavors[0].id
      - test2.cloud_flavors[0].disk > 0
      - test2.cloud_flavors[0].name
      - test2.cloud_flavors[0].ram > 0
      - test2.cloud_flavors[0].vcpus > 0
