---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: 'You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml'
  when: not sc_endpoint or not sc_token

- name: Test1, Delete non-existing segment by id
  sc_l2_segment:
    segment_id: '{{ non_existing_id }}'  # any valid but absent ID is good
    state: absent
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test1

- name: Check Test1
  assert:
    that:
      - test1 is not changed

- name: Test2, Delete non-existing segment by name
  sc_l2_segment:
    name: nonexisting
    state: absent
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test2

- name: Check Test2
  assert:
    that:
      - test2 is not changed


# Clean L2 segments with test servers as members
- name: Get all L2 segments list
  serverscom.sc_api.sc_l2_segments_info:
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: all_l2_segments

- name: Get full info of all the L2 segments
  serverscom.sc_api.sc_l2_segment_info:
    id: "{{ item.id }}"
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  loop: "{{ all_l2_segments.l2_segments }}"
  register: sc_l2_segments_full_info

- name: Initialize matched list
  set_fact:
    matched_segments: []

- name: Collect segments with test members
  set_fact:
    matched_segments: "{{ matched_segments + [item] }}"
  loop: "{{ sc_l2_segments_full_info.results }}"
  when: item.l2_segment.members
        | selectattr('id', 'in', [existing_server1_id, existing_server2_id, existing_server3_id])
        | list
        | length > 0

- name: Remove segments with test members
  sc_l2_segment:
    name: "{{ item.l2_segment.name }}"
    state: absent
    type: private
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  loop: "{{ matched_segments }}"
  loop_control:
    label: "{{ item.l2_segment.name }}"

- block:
    - name: Test3, Create segment in check mode
      sc_l2_segment:
        name: integration-test
        state: present
        type: private
        members:
          - id: '{{ existing_server1_id }}'
            mode: native
          - id: '{{ existing_server2_id }}'
            mode: native
          - id: '{{ existing_server3_id }}'
            mode: native
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      check_mode: true
      register: test3
      loop:
        - 1
        - 2

    - name: Check Test3
      assert:
        that:
          - test3 is changed
          - test3.results[0].location_group_id == test3.results[1].location_group_id
          - test3.results[0].location_group_id > 0

- block:
    - name: Test4, Create public segment for real
      sc_l2_segment:
        name: integration-test
        state: present
        type: private
        members:
          - id: '{{ existing_server1_id }}'
            mode: native
          - id: '{{ existing_server2_id }}'
            mode: native
          - id: '{{ existing_server3_id }}'
            mode: native
        labels:
          test_label: "test_value"
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      register: test4
      tags: create

    - name: Check Test4
      assert:
        that:
          - test4 is changed
          - test4.name == 'integration-test'
          - test4.id
          - test4.type == 'private'
          - test4.status == 'active'
          - test4.labels.test_label == 'test_value'

    - name: Test4a, Create public segment for real second time (idempotence)
      sc_l2_segment:
        name: integration-test
        state: present
        type: private
        members:
          - id: '{{ existing_server1_id }}'
            mode: native
          - id: '{{ existing_server2_id }}'
            mode: native
          - id: '{{ existing_server3_id }}'
            mode: native
        labels:
          test_label: "test_value"
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      register: test4a

    - name: Check Test4a
      assert:
        that:
          - test4a is not changed
          - test4a.name == 'integration-test'
          - test4a.id == test4.id
          - test4a.type == 'private'
          - test4a.status == 'active'
          - test4.labels.test_label == 'test_value'

    - name: Test5, Delete public segment in check mode
      sc_l2_segment:
        name: integration-test
        state: absent
        type: private
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      check_mode: true
      register: test5

    - name: Check Test5
      assert:
        that:
          - test5 is changed

    - name: Test6, Switch server type from native to trunk in check mode
      sc_l2_segment:
        name: integration-test
        state: present
        type: private
        members:
          - id: '{{ existing_server1_id }}'
            mode: native
          - id: '{{ existing_server2_id }}'
            mode: trunk
          - id: '{{ existing_server3_id }}'
            mode: native
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      check_mode: true
      register: test6

    - name: Check Test6
      assert:
        that:
          - test6 is changed
          - "test6.members_added == [{'id': existing_server2_id, 'mode': 'trunk'}]"
          - "test6.members_removed == [{'id': existing_server2_id, 'mode': 'native'}]"

    - name: Test7, Switch server type from native to trunk
      sc_l2_segment:
        name: integration-test
        state: present
        type: private
        members:
          - id: '{{ existing_server1_id }}'
            mode: native
          - id: '{{ existing_server2_id }}'
            mode: trunk
          - id: '{{ existing_server3_id }}'
            mode: native
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      register: test7
    - name: Check Test7
      assert:
        that:
          - test7 is changed
          - "test7.members_added == [{'id': existing_server2_id, 'mode': 'trunk'}]"
          - "test7.members_removed == [{'id': existing_server2_id, 'mode': 'native'}]"
          - "test7.members_kept|length == 2"

    - name: Test8, Use member_absent
      sc_l2_segment:
        name: integration-test
        state: present
        type: private
        members_absent:
          - id: '{{ existing_server2_id }}'
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      register: test8
    - name: Assert test8
      assert:
        that:
          - test8 is changed
          - test8.members_removed|length == 1
          - test8.members_kept|length == 2
      tags: assert9

    - name: Try to use sc_l2_segments_info
      sc_l2_segments_info:
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      register: segments

    - name: Test sc_l2_segments_info module
      assert:
        that:
          - |
            '"name": "integration-test"' in segments|to_json

    - name: Try to use sc_l2_segment_info by id
      sc_l2_segment_info:
        id: '{{  test4.id }}'
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      register: segment_by_id

    - name: Check output by_id
      assert:
        that:
          - segment_by_id is not changed
          - segment_by_id.l2_segment.name == 'integration-test'
          - segment_by_id.l2_segment.id  == test4.id
          - segment_by_id.l2_segment.members|length == 2
          - segment_by_id.l2_segment.networks == []
          - segment_by_id.l2_segment.status == 'active'

    - name: Try to use sc_l2_segment_info by name
      sc_l2_segment_info:
        name: integration-test
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      register: segment_by_name

    - name: Check output by_name
      assert:
        that:
          - segment_by_name is not changed
          - segment_by_name.l2_segment.name == 'integration-test'
          - segment_by_name.l2_segment.id  == test4.id
          - segment_by_name.l2_segment.members|length == 2
          - segment_by_name.l2_segment.networks == []
          - segment_by_name.l2_segment.status == 'active'

  always:
    - name: Test9 and cleanup, Delete public segment for real
      sc_l2_segment:
        name: integration-test
        state: absent
        type: private
      environment:
        SERVERSCOM_API_TOKEN: '{{ sc_token }}'
        SERVERSCOM_API_URL: '{{ sc_endpoint }}'
      register: test9
    - name: Check Test9
      assert:
        that:
          - test9 is changed
          - test9.id == test4.id
