---
# module tests for errors. Should be relatively fast.
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: 'You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml'
  when: not sc_endpoint or not sc_token

# should make a get to server before doing reinstall
- name: Test1, Error on absent server with incomplete data
  sc_dedicated_server_reinstall:
    endpoint: '{{ sc_endpoint }}'
    id: '{{ non_existing_id }}'
    drives_layout_template: raid1-simple
  environment:
    SC_TOKEN: '{{ sc_token }}'
  register: test1
  failed_when: false

- name: Check Test1
  assert:
    that:
      - test1 is not changed
      - test1.status_code == 404
      - "'v1/hosts/dedicated_servers/gd0EL519' in test1.api_url"

# should make a get to server before doing reinstall
- name: Test2, Error on absent ssh key
  sc_dedicated_server_reinstall:
    endpoint: '{{ sc_endpoint }}'
    id: '{{ existing_server1_id }}'
    drives_layout_template: raid1-simple
    ssh_key_name: should-not-exists
    operating_system_id: '42'
    hostname: somename
  environment:
    SC_TOKEN: '{{ sc_token }}'
  register: test2
  failed_when: false

- name: Check Test2
  assert:
    that:
      - test2 is not changed
      - '"Unable to find registered ssh key" in test2.msg'

- name: Test3, Error on absent server with all information
  sc_dedicated_server_reinstall:
    endpoint: '{{ sc_endpoint }}'
    id: '{{ non_existing_id }}'
    drives_layout_template: raid1-simple
    ssh_keys:
      - '58:e5:58:e9:38:10:82:57:d9:82:11:8c:f6:44:68:e8'
    operating_system_id: '42'
    hostname: somename
  environment:
    SC_TOKEN: '{{ sc_token }}'
  register: test3
  failed_when: false

- name: Check Test3
  assert:
    that:
      - test3 is not changed
      - test3.status_code == 404
      - '"v1/hosts/dedicated_servers/{{ non_existing_id }}/reinstall" in test3.api_url'
