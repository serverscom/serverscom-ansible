---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: "You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml"
  when: not sc_endpoint or not sc_token

- name: Make sure that test server is powered on
  serverscom.sc_api.sc_dedicated_server_power:
    state: "on"
    server_id: "{{ existing_server1_id }}"
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: server_power_on
  failed_when:
    - server_power_on.power_status != "powered_on"

- name: Power off server
  serverscom.sc_api.sc_dedicated_server_power:
    state: "off"
    server_id: "{{ existing_server1_id }}"
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test1

- name: Check Test1
  assert:
    that:
      - test1 is changed
      - test1.power_status == "powered_off"

- name: Power off server (idempotency test)
  serverscom.sc_api.sc_dedicated_server_power:
    state: "off"
    server_id: "{{ existing_server1_id }}"
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test2

- name: Check Test2
  assert:
    that:
      - test2 is not changed
      - test2.power_status == "powered_off"

- name: Power on server
  serverscom.sc_api.sc_dedicated_server_power:
    state: "on"
    server_id: "{{ existing_server1_id }}"
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test3

- name: Check Test3
  assert:
    that:
      - test3 is changed
      - test3.power_status == "powered_on"

- name: Power on server (idempotency test)
  serverscom.sc_api.sc_dedicated_server_power:
    state: "on"
    server_id: "{{ existing_server1_id }}"
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test4

- name: Check Test4
  assert:
    that:
      - test4 is not changed
      - test4.power_status == "powered_on"

- name: Power cycle server
  serverscom.sc_api.sc_dedicated_server_power:
    state: cycle
    server_id: "{{ existing_server1_id }}"
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test5

- name: Check Test5
  assert:
    that:
      - test5 is changed
      - test5.power_status == "powered_on"
