---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: 'You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml'
  when: not sc_endpoint or not sc_token

- name: Test1, Get L2 segments list
  sc_l2_segments_info:
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test1

- name: Check Test1
  assert:
    that:
      - test1 is not changed
      - ("l2_segments" in test1)

- name: Create test segment
  sc_l2_segment:
    name: sc-l2-segments-info-test
    state: present
    type: private
    members:
      - id: '{{ existing_server1_id }}'
        mode: native
      - id: '{{ existing_server2_id }}'
        mode: native
      - id: '{{ existing_server3_id }}'
        mode: native
    labels:
      test_label: "test_value"
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'

- name: Test2, Get L2 segments list by label
  sc_l2_segments_info:
    label_selector: "test_label==test_value"
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test2

- name: Check Test2
  assert:
    that:
      - ("l2_segments" in test2)
      - (test2.l2_segments|length == 1)
      - (test2.l2_segments[0].name == "sc-l2-segments-info-test")
      - (test2.l2_segments[0].labels.test_label == "test_value")

- name: Destroy test segment
  sc_l2_segment:
    name: sc-l2-segments-info-test
    state: absent
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
