---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: 'You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml'
  when: not sc_endpoint or not sc_token

- block:
    - name: Test1, List for non-existing location
      serverscom.sc_api.sc_sbm_flavor_models_info:
        location_id: 424242
      register: test1
      failed_when: test1.status_code != 404

    - name: Check Test1
      assert:
        that:
          - test1 is not changed
          - test1.status_code == 404

    - name: Get locations to find valid location_id
      serverscom.sc_api.sc_baremetal_locations_info: {}
      register: locations

    - name: Test2, Get SBM flavor models for first location
      serverscom.sc_api.sc_sbm_flavor_models_info:
        location_id: "{{ locations.locations[0].id }}"
      register: test2
      when: locations.locations | length > 0

    - name: Check Test2
      assert:
        that:
          - test2 is not changed
          - test2.sbm_flavor_models is defined
      when: locations.locations | length > 0

    - name: Test3, Get SBM flavor models with search pattern
      serverscom.sc_api.sc_sbm_flavor_models_info:
        location_id: "{{ locations.locations[0].id }}"
        search_pattern: "{{ test2.sbm_flavor_models[0].name[:3] | default('SBM') }}"
      register: test3
      when: locations.locations | length > 0 and test2.sbm_flavor_models | default([]) | length > 0

    - name: Check Test3
      assert:
        that:
          - test3 is not changed
          - test3.sbm_flavor_models is defined
      when: locations.locations | length > 0 and test2.sbm_flavor_models | default([]) | length > 0

    - name: Test4, Verify flavor model structure
      assert:
        that:
          - test2.sbm_flavor_models[0].id is defined
          - test2.sbm_flavor_models[0].name is defined
      when: locations.locations | length > 0 and test2.sbm_flavor_models | default([]) | length > 0

    - name: Test5, Get SBM flavor models using location_code
      serverscom.sc_api.sc_sbm_flavor_models_info:
        location_code: "{{ locations.locations[0].code }}"
      register: test5
      when: locations.locations | length > 0

    - name: Check Test5 matches Test2
      assert:
        that:
          - test5 is not changed
          - test5.sbm_flavor_models == test2.sbm_flavor_models
      when: locations.locations | length > 0

    - name: Test6, Get SBM flavor models with non-existing location_code
      serverscom.sc_api.sc_sbm_flavor_models_info:
        location_code: ZZZZZZ
      register: test6
      ignore_errors: true

    - name: Check Test6
      assert:
        that:
          - test6 is failed
          - '"not found" in test6.msg'

    - name: Test7, Verify location_id and location_code are mutually exclusive
      serverscom.sc_api.sc_sbm_flavor_models_info:
        location_id: 1
        location_code: AMS7
      register: test7
      ignore_errors: true
      when: locations.locations | length > 0

    - name: Check Test7
      assert:
        that:
          - test7 is failed
      when: locations.locations | length > 0

  module_defaults:
    group/serverscom.sc_api.api:
      endpoint: "{{ sc_endpoint }}"
    environment:
      SC_TOKEN: '{{ sc_token }}'
