---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: 'You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml'
  when: not sc_endpoint or not sc_token

- block:
    - name: Test1, List all SBM servers
      serverscom.sc_api.sc_sbm_servers_info: {}
      register: test1

    - name: Check Test1
      assert:
        that:
          - test1 is not changed
          - test1.sbm_servers is defined

    - name: Test2, List SBM servers with search pattern
      serverscom.sc_api.sc_sbm_servers_info:
        search_pattern: "nonexistent-pattern-xyz"
      register: test2

    - name: Check Test2
      assert:
        that:
          - test2 is not changed
          - test2.sbm_servers is defined

    - name: Test3, Verify server structure if any servers exist
      assert:
        that:
          - test1.sbm_servers[0].id is defined
          - test1.sbm_servers[0].status is defined
          - test1.sbm_servers[0].type == "sbm_server"
      when: test1.sbm_servers | length > 0

    - name: Test4, List SBM servers with label selector
      serverscom.sc_api.sc_sbm_servers_info:
        label_selector: "nonexistent-label=value"
      register: test4

    - name: Check Test4
      assert:
        that:
          - test4 is not changed
          - test4.sbm_servers is defined
          - test4.sbm_servers | length == 0

    - name: Get locations for location_code tests
      serverscom.sc_api.sc_baremetal_locations_info: {}
      register: locations

    - name: Test5, List SBM servers with location_code filter
      serverscom.sc_api.sc_sbm_servers_info:
        location_code: "{{ locations.locations[0].code }}"
      register: test5
      when: locations.locations | length > 0

    - name: Check Test5
      assert:
        that:
          - test5 is not changed
          - test5.sbm_servers is defined
      when: locations.locations | length > 0

    - name: Test6, Verify location_id and location_code are mutually exclusive
      serverscom.sc_api.sc_sbm_servers_info:
        location_id: 1
        location_code: AMS7
      register: test6
      ignore_errors: true

    - name: Check Test6
      assert:
        that:
          - test6 is failed

  module_defaults:
    group/serverscom.sc_api.api:
      token: "{{ sc_token }}"
      endpoint: "{{ sc_endpoint }}"
