---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: 'You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml'
  when: not sc_endpoint or not sc_token

- name: Test1, Simple get
  sc_cloud_computing_regions_info:
    token: '{{ sc_token }}'
    endpoint: '{{ sc_endpoint }}'
  register: test1

- name: Check Test1
  assert:
    that:
      - test1 is not changed
      - test1.regions|length >= 1
      - test1.regions[0].id is defined
      - test1.regions[0].name is defined
      - test1.regions[0].code is defined

- name: Test2, Search for location
  sc_cloud_computing_regions_info:
    token: '{{ sc_token }}'
    endpoint: '{{ sc_endpoint }}'
    search_pattern: WAS
  register: test2


- name: Check Test2
  assert:
    that:
      - test2.regions|length >= 1
      - "'AMS1' not in test2|string"
      - "'WAS1' in test2|string"
