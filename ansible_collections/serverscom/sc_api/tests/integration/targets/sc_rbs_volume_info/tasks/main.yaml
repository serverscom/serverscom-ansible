---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: "You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml"
  when: not sc_endpoint or not sc_token

- name: Volume info test series
  block:
    - name: Create test volume
      serverscom.sc_api.sc_rbs_volume:
        endpoint: "{{ sc_endpoint }}"
        token: "{{ sc_token }}"
        name: rbs_ansible_modules_test_volume
        location_id: 45
        flavor_id: 17363  # Basic
        size: 50
        state: present

    - name: Test1, Get volume list for a specific location id
      serverscom.sc_api.sc_rbs_volume_info:
        endpoint: "{{ sc_endpoint }}"
        token: "{{ sc_token }}"
        location_id: 45
      register: test1

    - name: Check Test1
      assert:
        that:
          - test1 is not changed
          - test1.rbs_volumes | length > 0
          - test1.rbs_volumes[0].id
          - test1.rbs_volumes[0].name
          - test1.rbs_volumes[0].size
          - test1.rbs_volumes[0].status
          - test1.rbs_volumes[0].location_id
          - test1.rbs_volumes[0].location_code
          - test1.rbs_volumes[0].ip_address
          - test1.rbs_volumes[0].flavor_id
          - test1.rbs_volumes[0].flavor_name
          - test1.rbs_volumes[0].iops
          - test1.rbs_volumes[0].bandwidth
          - test1.rbs_volumes[0].username
          - test1.rbs_volumes[0].password
          - test1.rbs_volumes[0].created_at
          - test1.rbs_volumes[0].updated_at

    - name: Test2, None volumes found
      serverscom.sc_api.sc_rbs_volume_info:
        endpoint: "{{ sc_endpoint }}"
        token: "{{ sc_token }}"
        search_pattern: "no_such_volume"
      register: test2

    - name: Check Test2
      assert:
        that:
          - test2.rbs_volumes | length == 0

    - name: Test3, Get volume list for a specific location code
      serverscom.sc_api.sc_rbs_volume_info:
        endpoint: "{{ sc_endpoint }}"
        token: "{{ sc_token }}"
        location_code: DFW5
      register: test3

    - name: Check Test3
      assert:
        that:
          - test3.rbs_volumes | length > 0

    - name: Test4, Get volume list for a specific search pattern
      serverscom.sc_api.sc_rbs_volume_info:
        endpoint: "{{ sc_endpoint }}"
        token: "{{ sc_token }}"
        search_pattern:
      register: test4

    - name: Check Test4
      assert:
        that:
          - test4.rbs_volumes | length > 0

  always:
    - name: Get test volumes
      serverscom.sc_api.sc_rbs_volume_info:
        endpoint: "{{ sc_endpoint }}"
        token: "{{ sc_token }}"
        location_id: 45
        search_pattern: "rbs_ansible_modules_test_volume"
      register: test_volumes

    - name: Remove test volumes if present
      serverscom.sc_api.sc_rbs_volume:
        endpoint: "{{ sc_endpoint }}"
        token: "{{ sc_token }}"
        volume_id: "{{ item.id }}"
        state: absent
      loop: "{{ test_volumes.rbs_volumes }}"
