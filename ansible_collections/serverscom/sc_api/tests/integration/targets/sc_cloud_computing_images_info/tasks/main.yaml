---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: 'You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml'
  when: not sc_endpoint or not sc_token

- name: Test1, List for non-existing region
  sc_cloud_computing_images_info:
    token: '{{ sc_token }}'
    endpoint: '{{ sc_endpoint }}'
    region_id: 424242
  register: test1
  failed_when: test1.status_code!=404

- name: Check Test1
  assert:
    that:
      - test1 is not changed
      - "'v1/cloud_computing/regions/424242/images' in test1.api_url"
      - test1.status_code == 404

- name: Test2 prep, get regions
  sc_cloud_computing_regions_info:
    token: '{{ sc_token }}'
    endpoint: '{{ sc_endpoint }}'
  register: regions

- name: Test2, Get image from any regions
  sc_cloud_computing_images_info:
    token: '{{ sc_token }}'
    endpoint: '{{ sc_endpoint }}'
    region_id: '{{ regions.regions[0].id }}'
  register: test2

- name: Check Test2
  assert:
    that:
      - test2 is not changed
      - test2.cloud_images|length > 0
      - test2.cloud_images[0].id
      - test2.cloud_images[0].name
      - test2.cloud_images[0].image_size > 0
