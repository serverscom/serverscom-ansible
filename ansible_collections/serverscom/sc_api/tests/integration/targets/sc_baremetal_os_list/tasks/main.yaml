---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: "You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml"
  when: not sc_endpoint or not sc_token

- name: Test1, Get OS list for a specific server
  sc_baremetal_os_list:
    server_id: "{{ existing_server1_id }}"
  environment:
    SC_TOKEN: '{{ sc_token }}'
  register: test1

- name: Check Test1
  assert:
    that:
      - test1 is not changed
      - test1.os_list | length > 0
      - test1.os_list[0].name
      - test1.os_list[0].full_name
      - test1.os_list[0].version
      - test1.os_list[0].arch
      - test1.os_list[0].id
      - test1.os_list[0].filesystems | length > 0

- name: Test2, Get OS list by name regex
  sc_baremetal_os_list:
    server_id: "{{ existing_server1_id }}"
    os_name_regex: "^Ubuntu 24.04-server x86_64$"
  environment:
    SC_TOKEN: '{{ sc_token }}'
  register: test2

- name: Check Test2
  assert:
    that:
      - test2 is not changed
      - test2.os_list | length == 1
      - test2.os_list[0].name

- name: Test3, Get OS list with location_id and server_model_id
  sc_baremetal_os_list:
    location_id: 34
    server_model_id: 11940
  environment:
    SC_TOKEN: '{{ sc_token }}'
  register: test3

- name: Check Test3
  assert:
    that:
      - test3 is not changed
      - test3.os_list | length > 0
      - test3.os_list[0].name

- name: Test4, Get OS list with location_code and server_model_name
  sc_baremetal_os_list:
    location_code: "ams1"
    server_model_name: "Dell R730xd / 2xIntel Xeon E5-2680 v3 / 32 GB RAM / 4x600 GB SAS"
  environment:
    SC_TOKEN: '{{ sc_token }}'
  register: test4

- name: Check Test4
  assert:
    that:
      - test4 is not changed
      - test4.os_list | length > 0
      - test4.os_list[0].name

- name: Test5, None OS options found
  sc_baremetal_os_list:
    server_id: "{{ existing_server1_id }}"
    os_name_regex: "^Ubuntu 24.04-server arm64$"
  environment:
    SC_TOKEN: '{{ sc_token }}'
  register: test5
  failed_when:
    - test5 is success

- name: Check Test5
  assert:
    that:
      - test5 is not changed
      - test5.msg == "No operating systems found matching the criteria"
