---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: "You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml"
  when: not sc_endpoint or not sc_token

- name: Test1, List for non-existing region
  sc_cloud_computing_openstack_credentials:
    region_id: 424242
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: test1
  failed_when: test1.status_code!=404

- name: Check Test1
  assert:
    that:
      - test1 is not changed
      - "'v1/cloud_computing/regions/424242/credentials' in test1.api_url"
      - test1.status_code == 404

- name: Test2 prep, get regions
  sc_cloud_computing_regions_info:
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: regions

- name: Test2, Get creds for region1
  sc_cloud_computing_openstack_credentials:
    region_id: "{{ regions.regions[0].id }}"
  environment:
    SERVERSCOM_API_TOKEN: '{{ sc_token }}'
    SERVERSCOM_API_URL: '{{ sc_endpoint }}'
  register: creds

- name: Check Test2
  assert:
    that:
      - creds is not changed
      - creds.url
      - creds.tenant_name
      - creds.username
      - creds.password
