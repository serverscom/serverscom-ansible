---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: 'You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml'
  when: not sc_endpoint or not sc_token

- name: Test1, List for non-existing location
  serverscom.sc_api.sc_rbs_flavors_info:
    endpoint: "{{ sc_endpoint }}"
    location_id: 424242
  environment:
    SC_TOKEN: '{{ sc_token }}'
  register: test1
  failed_when: test1.status_code!=404

- name: Check Test1
  assert:
    that:
      - test1 is not changed
      - test1.status_code == 404

- name: Test2, Get flavors
  serverscom.sc_api.sc_rbs_flavors_info:
    endpoint: "{{ sc_endpoint }}"
    location_id: 45
  environment:
    SC_TOKEN: '{{ sc_token }}'
  register: test2

- name: Check Test2
  assert:
    that:
      - test2 is not changed
      - test2.rbs_volume_flavors | length > 0
      - test2.rbs_volume_flavors[0].id
      - test2.rbs_volume_flavors[0].name
      - test2.rbs_volume_flavors[0].iops_per_gb
      - test2.rbs_volume_flavors[0].bandwidth_per_gb
      - test2.rbs_volume_flavors[0].min_size_gb
