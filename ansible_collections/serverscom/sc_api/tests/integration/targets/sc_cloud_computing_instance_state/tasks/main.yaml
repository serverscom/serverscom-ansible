---
- name: Check if there are sc_token and sc_endpoint variables
  no_log: true
  fail:
    msg: 'You need to define sc_token and sc_endpoint variables in tests/integration/integration_config.yml'
  when: not sc_endpoint or not sc_token

- name: Testsuite
  block:
    - name: prep
      sc_cloud_computing_regions_info:
        endpoint: '{{ sc_endpoint }}'
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: regions
    - name: Testsuite prepare, create instance
      sc_cloud_computing_instance:
        endpoint: '{{ sc_endpoint }}'
        state: present
        region_id: '{{ regions.regions[0].id }}'
        flavor_name: SSD.30
        image_regexp: 'Ubuntu.+'
        name: 4839550e-edf5-11ea-8df4-4f25b3878e42
        backup_copies: 0
        gpn: true
        ipv6: true
        wait: 600
        update_interval: 5
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: instance

    - name: Workaround
      pause:
        seconds: 30

    - name: Test2, shutdown in check mode
      sc_cloud_computing_instance_state:
        endpoint: '{{ sc_endpoint }}'
        name: 4839550e-edf5-11ea-8df4-4f25b3878e42
        state: shutdown
      environment:
        SC_TOKEN: '{{ sc_token }}'
      check_mode: true
      register: test2_check_mode

    - name: Test2, get instance
      sc_cloud_computing_instance_info:
        endpoint: '{{ sc_endpoint }}'
        instance_name: 4839550e-edf5-11ea-8df4-4f25b3878e42
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test2_result

    - name: Check Test2
      assert:
        that:
          - test2_check_mode is changed
          - test2_result.status == 'ACTIVE'

    - name: Test3, shutdown
      sc_cloud_computing_instance_state:
        endpoint: '{{ sc_endpoint }}'
        name: 4839550e-edf5-11ea-8df4-4f25b3878e42
        state: shutdown
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test3

    - name: Test3, get instance
      sc_cloud_computing_instance_info:
        endpoint: '{{ sc_endpoint }}'
        instance_name: 4839550e-edf5-11ea-8df4-4f25b3878e42
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test3_result

    - name: Check Test3
      assert:
        that:
          - test3 is changed
          - test3.name == '4839550e-edf5-11ea-8df4-4f25b3878e42'
          - test3.status == 'SWITCHED_OFF'
          - test3_result.status == 'SWITCHED_OFF'

    - name: Test4, start in check mode
      sc_cloud_computing_instance_state:
        endpoint: '{{ sc_endpoint }}'
        name: 4839550e-edf5-11ea-8df4-4f25b3878e42
        state: normal
      environment:
        SC_TOKEN: '{{ sc_token }}'
      check_mode: true
      register: test4

    - name: Test4, get instance
      sc_cloud_computing_instance_info:
        endpoint: '{{ sc_endpoint }}'
        instance_name: 4839550e-edf5-11ea-8df4-4f25b3878e42
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test4_result

    - name: Check Test4
      assert:
        that:
          - test4 is changed
          - test4.name == '4839550e-edf5-11ea-8df4-4f25b3878e42'
          - test4.status == 'SWITCHED_OFF'
          - test4_result.status == 'SWITCHED_OFF'

    - name: Test5, start
      sc_cloud_computing_instance_state:
        endpoint: '{{ sc_endpoint }}'
        name: 4839550e-edf5-11ea-8df4-4f25b3878e42
        state: normal
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test5

    - name: Test5, get instance
      sc_cloud_computing_instance_info:
        endpoint: '{{ sc_endpoint }}'
        instance_name: 4839550e-edf5-11ea-8df4-4f25b3878e42
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test5_result

    - name: Check Test5
      assert:
        that:
          - test5 is changed
          - test5.name == '4839550e-edf5-11ea-8df4-4f25b3878e42'
          - test5.status == 'ACTIVE'
          - test5_result.status == 'ACTIVE'

    - name: Test6, rescue in check_mode
      sc_cloud_computing_instance_state:
        endpoint: '{{ sc_endpoint }}'
        name: 4839550e-edf5-11ea-8df4-4f25b3878e42
        state: rescue
      environment:
        SC_TOKEN: '{{ sc_token }}'
      check_mode: true
      register: test6_check_mode

    - name: Test6, get instance
      sc_cloud_computing_instance_info:
        endpoint: '{{ sc_endpoint }}'
        instance_name: 4839550e-edf5-11ea-8df4-4f25b3878e42
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test6_result

    - name: Check Test6
      assert:
        that:
          - test6_check_mode is changed
          - test6_result.status == 'ACTIVE'

    - name: Test7, rescue
      sc_cloud_computing_instance_state:
        endpoint: '{{ sc_endpoint }}'
        name: 4839550e-edf5-11ea-8df4-4f25b3878e42
        state: rescue
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test7

    - name: Test7, get instance
      sc_cloud_computing_instance_info:
        endpoint: '{{ sc_endpoint }}'
        instance_name: 4839550e-edf5-11ea-8df4-4f25b3878e42
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test7_result

    - name: Check Test7
      assert:
        that:
          - test7 is changed
          - test7.name == '4839550e-edf5-11ea-8df4-4f25b3878e42'
          - test7.status == 'RESCUE'
          - test7_result.status == 'RESCUE'

    - name: Test8, unrescue in check_mode
      sc_cloud_computing_instance_state:
        endpoint: '{{ sc_endpoint }}'
        name: 4839550e-edf5-11ea-8df4-4f25b3878e42
        state: normal
      environment:
        SC_TOKEN: '{{ sc_token }}'
      check_mode: true
      register: test8

    - name: Test8, get instance
      sc_cloud_computing_instance_info:
        endpoint: '{{ sc_endpoint }}'
        instance_name: 4839550e-edf5-11ea-8df4-4f25b3878e42
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test8_result

    - name: Check Test8
      assert:
        that:
          - test8 is changed
          - test8.name == '4839550e-edf5-11ea-8df4-4f25b3878e42'
          - test8.status == 'RESCUE'
          - test8_result.status == 'RESCUE'

    - name: Test9, unrescue
      sc_cloud_computing_instance_state:
        endpoint: '{{ sc_endpoint }}'
        name: 4839550e-edf5-11ea-8df4-4f25b3878e42
        state: normal
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test9

    - name: Test9, get instance
      sc_cloud_computing_instance_info:
        endpoint: '{{ sc_endpoint }}'
        instance_name: 4839550e-edf5-11ea-8df4-4f25b3878e42
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test9_result

    - name: Check Test9
      assert:
        that:
          - test9 is changed
          - test9.name == '4839550e-edf5-11ea-8df4-4f25b3878e42'
          - test9.status == 'ACTIVE'
          - test9_result.status == 'ACTIVE'


    - name: Test10, cycle states
      sc_cloud_computing_instance_state:
        endpoint: '{{ sc_endpoint }}'
        name: 4839550e-edf5-11ea-8df4-4f25b3878e42
        state: '{{ item }}'
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test10
      loop:
        - shutdown
        # - rescue
        - normal

    - name: Check test10
      assert:
        that:
          - test10.changed
          - test10.results[0].status == 'SWITCHED_OFF'
          # - test10.results[1].status == 'RESCUE'
          # - test10.results[2].status == 'ACTIVE'  #BUG HERE
          - test10.results[1].status == 'ACTIVE'

    - name: Test11, rescue with image_regexp
      sc_cloud_computing_instance_state:
        endpoint: '{{ sc_endpoint }}'
        name: 4839550e-edf5-11ea-8df4-4f25b3878e42
        image_regexp: '.*Cent.+'
        state: '{{ item }}'
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test11
      loop:
        - rescue
        - normal

    - name: Test12, fire-n-forget in checkmode
      sc_cloud_computing_instance_state:
        endpoint: '{{ sc_endpoint }}'
        name: 4839550e-edf5-11ea-8df4-4f25b3878e42
        state: '{{ item }}'
        wait: 0
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test12
      check_mode: true
      loop:
        - shutdown
        - rescue
        - normal

    - name: Check test12
      assert:
        that:
          - test12.results[0] is changed
          - test12.results[1] is changed
          - test12.results[2] is not changed
          - test12.results[2].status == 'ACTIVE'

    - name: Test13, fire-n-forget shutdown
      sc_cloud_computing_instance_state:
        endpoint: '{{ sc_endpoint }}'
        name: 4839550e-edf5-11ea-8df4-4f25b3878e42
        state: shutdown
        wait: 0
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test13

    - name: Check Test13
      assert:
        that:
          - test13 is changed
          - test13.name == '4839550e-edf5-11ea-8df4-4f25b3878e42'
          - test13.status != 'SWITCHED_OFF'

    - name: Test13 wait for instance to shutdown
      sc_cloud_computing_instance_info:
        endpoint: '{{ sc_endpoint }}'
        name: 4839550e-edf5-11ea-8df4-4f25b3878e42
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test13_info
      until: test13_info.status == 'SWITCHED_OFF'
      delay: 10
      retries: 60

    - name: Test14, rescue
      sc_cloud_computing_instance_state:
        endpoint: '{{ sc_endpoint }}'
        name: 4839550e-edf5-11ea-8df4-4f25b3878e42
        state: rescue
        wait: 600
        update_interval: 10
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test14

    - debug: var=test14
    - name: Test14, check result
      assert:
        that:
          - test14.status == 'RESCUE'

    - name: Put instance back in normal state
      sc_cloud_computing_instance_state:
        endpoint: '{{ sc_endpoint }}'
        name: 4839550e-edf5-11ea-8df4-4f25b3878e42
        state: normal
        wait: 600
        update_interval: 10
      environment:
        SC_TOKEN: '{{ sc_token }}'

    - name: Test15 reboot instance
      sc_cloud_computing_instance_state:
        endpoint: '{{ sc_endpoint }}'
        name: 4839550e-edf5-11ea-8df4-4f25b3878e42
        state: rebooted
        wait: 0
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test15

    - name: Test15, check result
      assert:
        that:
          - test15 is changed
          - test15.status == 'REBOOTING'

    - name: Wait until instance finishes rebooting
      sc_cloud_computing_instance_info:
        endpoint: '{{ sc_endpoint }}'
        name: 4839550e-edf5-11ea-8df4-4f25b3878e42
      environment:
        SC_TOKEN: '{{ sc_token }}'
      register: test15_info
      until: test15_info.status == 'ACTIVE'
      delay: 10
      retries: 60

  always:
    - name: Testsuite cleanup
      sc_cloud_computing_instance:
        endpoint: '{{ sc_endpoint }}'
        state: absent
        region_id: '{{ regions.regions[0].id }}'
        name: 4839550e-edf5-11ea-8df4-4f25b3878e42
        wait: 600
      environment:
        SC_TOKEN: '{{ sc_token }}'
